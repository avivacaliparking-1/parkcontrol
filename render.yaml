services:
  - type: web
    name: parkcontrol
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parkcontrol-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: parkcontrol-db
    databaseName: parkcontrol
    user: parkcontrol_user
    plan: free
